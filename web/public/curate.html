<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ingredient Curation</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0; background: #0d0d1a; color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Header ── */
#hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; flex-shrink: 0; gap: 8px;
}
#progress { font-size: 0.85rem; color: #94a3b8; font-weight: 500; }
#session  { font-size: 0.73rem; color: #475569; }
#hdr-right { display: flex; gap: 6px; align-items: center; }
.ico-btn {
  background: #1e293b; border: none; color: #94a3b8; border-radius: 8px;
  padding: 6px 10px; cursor: pointer; font-size: 0.82rem; white-space: nowrap;
}
.ico-btn:hover { background: #334155; color: #e2e8f0; }
#sync-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #334155;
  flex-shrink: 0; transition: background 0.3s;
}
#sync-dot.saved  { background: #22c55e; }
#sync-dot.saving { background: #f59e0b; }
#sync-dot.err    { background: #ef4444; }

/* ── Settings panel ── */
#settings {
  background: #1e293b; border-bottom: 1px solid #334155;
  padding: 14px 16px; flex-shrink: 0;
  display: none; flex-direction: column; gap: 10px;
}
#settings.open { display: flex; }
.setting-row { display: flex; flex-direction: column; gap: 4px; }
.setting-row label { font-size: 0.72rem; color: #64748b; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.setting-row input {
  padding: 8px 10px; background: #0f172a; color: #e2e8f0;
  border: 1px solid #334155; border-radius: 6px; font-size: 0.85rem; outline: none;
}
.setting-row input:focus { border-color: #6366f1; }
.setting-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.sact {
  padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 0.78rem; font-weight: 600;
}
.sact-primary { background: #6366f1; color: white; }
.sact-secondary { background: #334155; color: #cbd5e1; }
.sact-danger { background: #7f1d1d; color: #fca5a5; }
#token-msg { font-size: 0.75rem; color: #64748b; min-height: 14px; }

/* ── Progress bar ── */
#pbar { height: 2px; background: #1e293b; flex-shrink: 0; }
#pfill { height: 100%; background: #6366f1; transition: width 0.4s; width: 0%; }

/* ── Card stage ── */
#stage {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
#loading { text-align: center; color: #475569; }

/* ── Card ── */
#card {
  background: white; color: #1e293b; border-radius: 20px;
  width: min(340px, 86vw); padding: 40px 24px 32px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.55);
  position: relative; cursor: grab; user-select: none;
  will-change: transform;
}
#card:active { cursor: grabbing; }
#card.validated { border-top: 4px solid #22c55e; }
#cname {
  font-size: clamp(1.5rem, 6vw, 2rem); font-weight: 700;
  text-align: center; margin-bottom: 4px; line-height: 1.2;
  word-break: break-word;
}
#cfr { text-align: center; font-size: 0.95rem; color: #64748b; font-style: italic; margin-bottom: 10px; min-height: 1.2em; }
#cpairings { text-align: center; font-size: 0.8rem; color: #94a3b8; }
#cstatus   { text-align: center; font-size: 0.7rem; color: #22c55e; font-weight: 600; margin-top: 4px; min-height: 16px; }

/* Direction hint labels */
.hlbl {
  position: absolute; font-size: 0.95rem; font-weight: 800;
  letter-spacing: 0.08em; padding: 4px 11px; border-radius: 6px;
  border: 3px solid; opacity: 0; pointer-events: none;
}
#lbl-del  { top: 18px; right: 14px; color: #ef4444; border-color: #ef4444; transform: rotate(12deg); }
#lbl-keep { top: 18px; left:  14px; color: #22c55e; border-color: #22c55e; transform: rotate(-12deg); }
#lbl-mrg  { bottom: 18px; left: 50%; transform: translateX(-50%); color: #60a5fa; border-color: #60a5fa; }

/* ── Action buttons ── */
#actions {
  display: flex; justify-content: center; align-items: center;
  gap: 20px; padding: 16px; flex-shrink: 0;
}
.abtn {
  border: none; border-radius: 50%; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(0,0,0,0.4);
  transition: transform 0.12s, box-shadow 0.12s; flex-shrink: 0;
}
.abtn:hover  { transform: scale(1.1); }
.abtn:active { transform: scale(0.92); }
#btn-del { width: 60px; height: 60px; background: #ef4444; font-size: 1.3rem; }
#btn-mrg { width: 48px; height: 48px; background: #3b82f6; font-size: 1.1rem; }
#btn-kep { width: 60px; height: 60px; background: #22c55e; font-size: 1.3rem; }
#kbhint { text-align: center; font-size: 0.68rem; color: #1e293b; padding-bottom: 12px; flex-shrink: 0; }

/* ── Done screen ── */
#done {
  display: none; flex: 1; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; padding: 24px;
}
#done h2 { font-size: 2rem; margin: 12px 0 8px; }
#done p  { color: #64748b; line-height: 1.9; margin-bottom: 28px; }
#done b  { color: #e2e8f0; }
#restart {
  padding: 10px 28px; border: none; border-radius: 8px; cursor: pointer;
  background: #6366f1; color: white; font-size: 0.9rem; font-weight: 600;
}

/* ── Merge overlay ── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 50;
  align-items: center; justify-content: center;
}
#overlay.open { display: flex; }
#modal {
  background: #1e293b; border-radius: 18px; padding: 22px;
  width: min(420px, 92vw); box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
#modal h3 { margin: 0 0 14px; font-size: 0.95rem; font-weight: 600; color: #e2e8f0; }
#modal h3 em { color: #60a5fa; font-style: normal; }
#msearch {
  width: 100%; padding: 10px 13px; background: #0f172a; color: #e2e8f0;
  border: 1px solid #334155; border-radius: 8px; font-size: 0.88rem; outline: none;
}
#msearch:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
#mresults { margin-top: 6px; max-height: 200px; overflow-y: auto; }
.mitem {
  padding: 9px 13px; border-radius: 6px; cursor: pointer;
  font-size: 0.85rem; color: #cbd5e1;
}
.mitem:hover, .mitem.hi { background: #334155; color: white; }
#mcancel {
  display: block; text-align: center; margin-top: 12px;
  font-size: 0.78rem; color: #475569; cursor: pointer;
}
#mcancel:hover { color: #94a3b8; }
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div id="progress">Loading…</div>
    <div id="session"></div>
  </div>
  <div id="hdr-right">
    <div id="sync-dot" title="Sync status"></div>
    <button class="ico-btn" onclick="saveToGH()" title="Save decisions to GitHub">Save ↑</button>
    <button class="ico-btn" onclick="toggleSettings()">⚙</button>
  </div>
</div>

<div id="settings">
  <div class="setting-row">
    <label>GitHub Token (repo → contents write)</label>
    <input id="gh-token" type="password" placeholder="ghp_…" oninput="onTokenInput()">
    <div id="token-msg">Enter a token to sync decisions across devices.</div>
  </div>
  <div class="setting-actions">
    <button class="sact sact-primary"   onclick="testAndSaveToken()">Connect</button>
    <button class="sact sact-secondary" onclick="loadFromGH()">Load from GitHub</button>
    <button class="sact sact-secondary" onclick="exportJSON()">Export JSON</button>
    <button class="sact sact-danger"    onclick="clearAll()">Reset all</button>
  </div>
</div>

<div id="pbar"><div id="pfill"></div></div>

<div id="stage">
  <div id="loading">Loading ingredients…</div>
  <div id="card" style="display:none">
    <span class="hlbl" id="lbl-del">DELETE</span>
    <span class="hlbl" id="lbl-keep">KEEP</span>
    <span class="hlbl" id="lbl-mrg">MERGE</span>
    <div id="cname"></div>
    <div id="cfr"></div>
    <div id="cpairings"></div>
    <div id="cstatus"></div>
  </div>
</div>

<div id="done">
  <div style="font-size:3rem">✓</div>
  <h2>All done!</h2>
  <p id="done-stats"></p>
  <button id="restart" onclick="restart()">Start over</button>
</div>

<div id="actions" style="display:none">
  <button class="abtn" id="btn-del" title="Delete ←"  onclick="go('left')">✕</button>
  <button class="abtn" id="btn-mrg" title="Merge  ↑"  onclick="go('up')">↑</button>
  <button class="abtn" id="btn-kep" title="Keep   →"  onclick="go('right')">♥</button>
</div>
<div id="kbhint" style="display:none">← delete · ↑ merge · → keep</div>

<div id="overlay">
  <div id="modal">
    <h3>Merge <em id="mfrom"></em> into…</h3>
    <input id="msearch" placeholder="Type ingredient name…" autocomplete="off"
           oninput="filterM()" onkeydown="keyM(event)">
    <div id="mresults"></div>
    <span id="mcancel" onclick="closeM()">Cancel (Esc)</span>
  </div>
</div>

  [' starch',  b => /^[aeiouy]/i.test(b) ? `fécule d'${b}` : `fécule de ${b}`],
  [' flakes',  b => /^[aeiouy]/i.test(b) ? `flocons d'${b}` : `flocons de ${b}`],
  [' chips',   b => `chips de ${b}`],
  [' spread',  b => `tartinade de ${b}`],
];

function translateFr(name) {
  const lk = n => frDict[n] ?? frDict[n.toLowerCase()] ?? null;
  const exact = lk(name);
  if (exact) return exact;
  const lower = name.toLowerCase().trim();
  for (const [pre, frMod] of Object.entries(PREFIX_FR)) {
    if (lower.startsWith(pre + ' ')) {
      const rest = name.slice(pre.length + 1);
      const base = lk(rest);
      if (base) return `${base} ${frMod}`;
    }
  }
  for (const [col, frCol] of Object.entries(COLOR_FR)) {
    if (lower.startsWith(col + ' ')) {
      const rest = name.slice(col.length + 1);
      const base = lk(rest);
      if (base) return `${base} ${frCol}`;
    }
  }
  for (const [suf, fmt] of SUFFIXES) {
    if (lower.endsWith(suf)) {
      const baseEn = name.slice(0, name.length - suf.length);
      return fmt(lk(baseEn) ?? baseEn);
    }
  }
  return null;  // no translation found
}

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  loadDecisionsFromLS();

  const token = localStorage.getItem(LS_TOKEN);
  if (token) {
    document.getElementById('gh-token').value = token;
    await loadFromGH(true);   // silent = true
  }

  try {
    const r = await fetch('./pairings.json');
    if (!r.ok) throw new Error('pairings.json not found');
    const data = await r.json();

    // Compute pairing count — handle v2 (FlavorGraph, key = "idx") and
    // v1 (demo/RecipeNLG, key = "cuisineIdx,idx") formats
    const counts = {};
    data.i.forEach((_, ii) => {
      counts[ii] = (data.p[String(ii)] || data.p['0,' + ii] || []).length;
    });

    ingredients = data.i
      .map((name, i) => ({ name, pairings: counts[i] || 0 }))
      .sort((a, b) => a.name.localeCompare(b.name));

  } catch (e) {
    document.getElementById('loading').textContent = 'Could not load pairings.json: ' + e.message;
    return;
  }

  buildQueue();
  showCard();
}

function loadDecisionsFromLS() {
  try {
    const s = localStorage.getItem(LS_DECISIONS);
    if (s) decisions = JSON.parse(s);
  } catch (_) {}
  syncSets();
}

function syncSets() {
  validatedSet = new Set(decisions.validated || []);
  deletedSet   = new Set(decisions.deleted   || []);
  mergedMap    = new Map(Object.entries(decisions.merged || {}));
}

function saveDecisionsToLS() {
  localStorage.setItem(LS_DECISIONS, JSON.stringify(decisions));
}

function buildQueue() {
  queue = ingredients.filter(i =>
    i.pairings > 0            &&
    !validatedSet.has(i.name) &&
    !deletedSet.has(i.name)   &&
    !mergedMap.has(i.name)
  );
  // Fisher-Yates shuffle for random order
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  idx   = 0;
  stats = { kept: 0, deleted: 0, merged: 0 };
}

function restart() { buildQueue(); showCard(); }

// ── Card display ─────────────────────────────────────────────────────────────
function showCard() {
  busy = false;
  setLabels(0, 0, 0);

  const stage   = document.getElementById('stage');
  const card    = document.getElementById('card');
  const loading = document.getElementById('loading');
  const done    = document.getElementById('done');
  const actions = document.getElementById('actions');
  const kbhint  = document.getElementById('kbhint');

  if (idx >= queue.length) {
    stage.style.display   = 'flex';
    card.style.display    = 'none';
    loading.style.display = 'none';
    done.style.display    = 'flex';
    actions.style.display = 'none';
    kbhint.style.display  = 'none';

    const total = ingredients.length;
    const v = validatedSet.size, d = deletedSet.size, m = mergedMap.size;
    document.getElementById('done-stats').innerHTML =
      '<b>' + v + '</b> kept &nbsp;·&nbsp; ' +
      '<b>' + d + '</b> deleted &nbsp;·&nbsp; ' +
      '<b>' + m + '</b> merged<br>' +
      '<b>' + (total - v - d - m) + '</b> undecided of ' + total;
    document.getElementById('progress').textContent = 'All reviewed!';
    document.getElementById('pfill').style.width = '100%';
    // Auto-save to GitHub on completion
    saveToGH(true);
    return;
  }

  stage.style.display   = 'flex';
  loading.style.display = 'none';
  done.style.display    = 'none';
  card.style.display    = 'block';
  actions.style.display = 'flex';
  kbhint.style.display  = 'block';

  const item = queue[idx];
  card.style.transition = 'none';
  card.style.transform  = '';
  card.style.opacity    = '1';
  card.className        = validatedSet.has(item.name) ? 'validated' : '';

  document.getElementById('cname').textContent     = item.name;
  document.getElementById('cfr').textContent       = translateFr(item.name) || '';
  document.getElementById('cpairings').textContent = item.pairings + ' pairings';
  document.getElementById('cstatus').textContent   = '';

  const total = queue.length + stats.kept + stats.deleted + stats.merged;
  const done2 = stats.kept + stats.deleted + stats.merged;
  document.getElementById('progress').textContent = (done2 + 1) + ' / ' + total;
  document.getElementById('pfill').style.width    = (done2 / total * 100) + '%';
  const parts = [];
  if (stats.kept)    parts.push(stats.kept    + ' kept');
  if (stats.deleted) parts.push(stats.deleted + ' deleted');
  if (stats.merged)  parts.push(stats.merged  + ' merged');
  document.getElementById('session').textContent = parts.join(' · ');
}

// ── Direction trigger ────────────────────────────────────────────────────────
function go(dir) {
  if (busy || idx >= queue.length) return;
  if (dir === 'up') { openM(); return; }
  busy = true;
  setLabels(dir === 'left' ? 1 : 0, dir === 'right' ? 1 : 0, 0);
  flyOut(dir, dir === 'left' ? doDelete : doKeep);
}

function flyOut(dir, cb) {
  const card = document.getElementById('card');
  card.style.transition = 'transform 0.32s ease, opacity 0.32s ease';
  if (dir === 'left')  card.style.transform = 'translateX(-130vw) rotate(-28deg)';
  if (dir === 'right') card.style.transform = 'translateX(130vw)  rotate(28deg)';
  if (dir === 'up')    card.style.transform = 'translateY(-110vh)';
  card.style.opacity = '0';
  setTimeout(cb, 340);
}

// ── Auto-save ─────────────────────────────────────────────────────────────────
let autoSaveTimer = null;
function scheduleAutoSave() {
  if (!localStorage.getItem(LS_TOKEN)) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => saveToGH(true), 20000);  // 20 s after last action
}

// ── Actions ──────────────────────────────────────────────────────────────────
function doDelete() {
  const name = queue[idx].name;
  if (!deletedSet.has(name)) {
    decisions.deleted.push(name);
    deletedSet.add(name);
    saveDecisionsToLS();
    scheduleAutoSave();
  }
  stats.deleted++;
  queue.splice(idx, 1);
  showCard();
}

function doKeep() {
  const name = queue[idx].name;
  if (!validatedSet.has(name)) {
    decisions.validated.push(name);
    validatedSet.add(name);
    saveDecisionsToLS();
    scheduleAutoSave();
  }
  stats.kept++;
  idx++;
  showCard();
}

// ── Merge overlay ─────────────────────────────────────────────────────────────
function openM() {
  document.getElementById('mfrom').textContent  = '"' + queue[idx].name + '"';
  document.getElementById('msearch').value      = '';
  document.getElementById('mresults').innerHTML = '';
  mhits = []; msel = -1;
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('msearch').focus(), 40);
}

function closeM() {
  document.getElementById('overlay').classList.remove('open');
  busy = false;
}

function filterM() {
  const q      = document.getElementById('msearch').value.toLowerCase().trim();
  const fromId = queue[idx].name;
  msel = -1;
  if (!q) { document.getElementById('mresults').innerHTML = ''; mhits = []; return; }
  mhits = ingredients.filter(i =>
    i.name !== fromId &&
    !deletedSet.has(i.name) &&
    i.name.toLowerCase().includes(q)
  ).slice(0, 12);
  document.getElementById('mresults').innerHTML = mhits.map((m, i) =>
    '<div class="mitem" data-i="' + i + '" onclick="pickM(' + i + ')">' + esc(m.name) + '</div>'
  ).join('');
}

function keyM(e) {
  const items = document.getElementById('mresults').querySelectorAll('.mitem');
  if (e.key === 'Escape') { closeM(); return; }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    msel = Math.min(msel + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('hi', i === msel));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    msel = Math.max(msel - 1, 0);
    items.forEach((el, i) => el.classList.toggle('hi', i === msel));
  } else if (e.key === 'Enter' && msel >= 0) {
    pickM(msel);
  }
}

function pickM(hitIdx) {
  const from = queue[idx].name;
  const into = mhits[hitIdx];
  if (!into) return;
  closeM();
  busy = true;

  if (!mergedMap.has(from)) {
    decisions.merged[from] = into.name;
    mergedMap.set(from, into.name);
    saveDecisionsToLS();
    scheduleAutoSave();
  }

  setLabels(0, 0, 1);
  flyOut('up', () => {
    stats.merged++;
    queue.splice(idx, 1);
    showCard();
  });
}

// ── Hint labels ───────────────────────────────────────────────────────────────
function setLabels(del, keep, mrg) {
  document.getElementById('lbl-del').style.opacity  = del;
  document.getElementById('lbl-keep').style.opacity = keep;
  document.getElementById('lbl-mrg').style.opacity  = mrg;
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('overlay').classList.contains('open')) return;
  if (document.getElementById('settings').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); go('left');  }
  if (e.key === 'ArrowRight') { e.preventDefault(); go('right'); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); go('up');    }
});

// ── Drag / swipe ──────────────────────────────────────────────────────────────
let ox, oy, dragging = false;
const card = document.getElementById('card');

card.addEventListener('mousedown',  e => { if (!busy) { ox = e.clientX; oy = e.clientY; dragging = true; } });
document.addEventListener('mousemove', e => { if (dragging) moveDrag(e.clientX, e.clientY); });
document.addEventListener('mouseup',   e => { if (dragging) { dragging = false; endDrag(e.clientX, e.clientY); } });

card.addEventListener('touchstart', e => {
  if (!busy) { ox = e.touches[0].clientX; oy = e.touches[0].clientY; dragging = true; }
}, { passive: true });
card.addEventListener('touchmove', e => {
  if (dragging) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
card.addEventListener('touchend', e => {
  if (dragging) { dragging = false; endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }
});

function moveDrag(cx, cy) {
  if (idx >= queue.length) return;
  const dx = cx - ox, dy = cy - oy, th = 60;
  card.style.transition = 'none';
  card.style.transform  = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + dx * 0.07 + 'deg)';
  setLabels(
    Math.min(Math.max(-dx, 0) / th, 1),
    Math.min(Math.max( dx, 0) / th, 1),
    Math.min(Math.max(-dy, 0) / th, 1)
  );
}

function endDrag(cx, cy) {
  const dx = cx - ox, dy = cy - oy, th = 80;
  if      (dx < -th) go('left');
  else if (dx >  th) go('right');
  else if (dy < -th) go('up');
  else {
    card.style.transition = 'transform 0.28s ease';
    card.style.transform  = '';
    setLabels(0, 0, 0);
  }
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeM();
});

// ── GitHub sync ────────────────────────────────────────────────────────────────
function setSyncDot(state) {  // 'saved' | 'saving' | 'err' | ''
  const dot = document.getElementById('sync-dot');
  dot.className = state;
  dot.title = { saved: 'Saved to GitHub', saving: 'Saving…', err: 'Save failed', '': 'Not connected' }[state] || '';
}

async function ghFetch(path, opts = {}) {
  const token = localStorage.getItem(LS_TOKEN);
  if (!token) throw new Error('No token');
  return fetch('https://api.github.com' + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {})
    }
  });
}

async function loadFromGH(silent = false) {
  try {
    const r = await ghFetch('/repos/' + REPO + '/contents/' + CFILE + '?ref=' + CBRANCH);
    if (!r.ok) {
      if (!silent) setMsg('token-msg', 'File not found on GitHub yet — save to create it.');
      return;
    }
    const meta = await r.json();
    const text = atob(meta.content.replace(/\n/g, ''));
    const remote = JSON.parse(text);
    // Merge: union of validated/deleted, remote merged takes precedence
    const v = new Set([...(decisions.validated || []), ...(remote.validated || [])]);
    const d = new Set([...(decisions.deleted   || []), ...(remote.deleted   || [])]);
    decisions = {
      validated: [...v],
      deleted:   [...d],
      merged: { ...(remote.merged || {}), ...(decisions.merged || {}) }
    };
    syncSets();
    saveDecisionsToLS();
    setSyncDot('saved');
    if (!silent) setMsg('token-msg', 'Loaded from GitHub ✓');
  } catch (e) {
    if (!silent) setMsg('token-msg', 'Load failed: ' + e.message);
    setSyncDot('err');
  }
}

async function saveToGH(silent = false) {
  const token = localStorage.getItem(LS_TOKEN);
  if (!token) {
    if (!silent) setMsg('token-msg', 'Enter a token first.');
    return;
  }
  setSyncDot('saving');
  try {
    // Get current SHA (needed to update existing file)
    let sha = null;
    const check = await ghFetch('/repos/' + REPO + '/contents/' + CFILE + '?ref=' + CBRANCH);
    if (check.ok) sha = (await check.json()).sha;

    const payload = { ...decisions, lastSaved: new Date().toISOString() };
    const body = {
      message: 'Update curation decisions',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
      branch: CBRANCH,
    };
    if (sha) body.sha = sha;

    const r = await ghFetch('/repos/' + REPO + '/contents/' + CFILE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error((await r.json()).message || r.status);
    setSyncDot('saved');
    if (!silent) setMsg('token-msg', 'Saved to GitHub ✓');
  } catch (e) {
    setSyncDot('err');
    if (!silent) setMsg('token-msg', 'Save failed: ' + e.message);
  }
}

// ── Settings panel ─────────────────────────────────────────────────────────────
function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

function onTokenInput() { setSyncDot(''); }

async function testAndSaveToken() {
  const token = document.getElementById('gh-token').value.trim();
  if (!token) { setMsg('token-msg', 'Enter a token first.'); return; }
  setMsg('token-msg', 'Testing…');
  try {
    const r = await fetch('https://api.github.com/repos/' + REPO, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    localStorage.setItem(LS_TOKEN, token);
    setMsg('token-msg', 'Connected ✓  —  loading progress from GitHub…');
    await loadFromGH(false);
    if (queue.length) buildQueue(), showCard();
  } catch (e) {
    setMsg('token-msg', 'Connection failed: ' + e.message);
  }
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(decisions, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: 'curation.json'
  });
  a.click();
}

function clearAll() {
  if (!confirm('Reset all curation decisions? This cannot be undone.')) return;
  decisions = { validated: [], deleted: [], merged: {} };
  syncSets();
  saveDecisionsToLS();
  buildQueue();
  showCard();
}

function setMsg(id, text) { document.getElementById(id).textContent = text; }

// ── Util ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
